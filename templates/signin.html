<!DOCTYPE html>
<html lang="en" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            *{
                font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            }
            input {
                margin-bottom: 1rem;    
            }

        </style>
    </head>

    <body style="height: 100vh;margin: 0;display: flex;justify-content: center;align-items: center;background-image: url('../static/assets/mainpage.jpg');background-size: cover;">
        {%if msg%}
        <div class="alert alert-danger" role="alert">
        {{msg}}
        </div>
        {%endif%}
        <div style="width: 40vw;background-color: #FAFAFA ;padding: 20px;border:1px solid rgb(170, 165, 165);min-height:60vh;max-height: 90vh;overflow-y: scroll;scroll-behavior: smooth;border-radius: 10px;scrollbar-width: none;">
            <form action="" method="post">
                <h1 style="margin:auto 0;text-align: center;margin-bottom: 2rem;">ورود</h1>
                <input type="text" class="form-control" placeholder="نام کاربری" name="username">
                <input type="password" class="form-control" placeholder="رمز عبور" name="password">
                <div style="display: flex;justify-content: center;">
                <button type="submit" class="btn btn-primary">تایید</button>
                </div>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>

</html>
