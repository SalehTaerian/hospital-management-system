{% extends "base.html" %}

{% block title %}Edit Staff{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Staff Member</h4>
            </div>
            <div class="card-body">
                <form id="editStaffForm">
                    <input type="hidden" id="employeeId" value="{{ staff.employeeid }}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" value="{{ staff.firstname }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" value="{{ staff.lastname }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">National Code</label>
                            <input type="text" class="form-control" id="nationalCode" value="{{ staff.nationalcode }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Current Role</label>
                            <p class="form-control-static"><span class="badge bg-info">{{ staff.role }}</span></p>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contract Type</label>
                            <select class="form-control" id="contractType" required>
                                <option value="">Select...</option>
                                <option value="Permanent" {% if staff.contracttype == 'Permanent' %}selected{% endif %}>Permanent</option>
                                <option value="Temporary" {% if staff.contracttype == 'Temporary' %}selected{% endif %}>Temporary</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hire Date</label>
                            <input type="date" class="form-control" id="hireDate" value="{{ staff.hiredate.strftime('%Y-%m-%d') if staff.hiredate else '' }}">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-control" id="department" required>
                                <option value="">Select...</option>
                                {% for dep in departments %}
                                <option value="{{ dep.departid }}" {% if staff.departid == dep.departid %}selected{% endif %}>
                                    {{ dep.name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Change Role</label>
                            <select class="form-control" id="accessLevel">
                                <option value="">No Change</option>
                                <option value="doctor">Doctor</option>
                                <option value="surgeon">Surgeon</option>
                                <option value="nurse">Nurse</option>
                                <option value="officeStaff">Office Staff</option>
                            </select>
                            <small class="text-muted">Select a role to change it. Leave empty to keep current.</small>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" class="form-control" id="salary" step="0.01" value="{{ staff.salary }}">
                    </div>
                    
                    {% if staff.role == 'Doctor' %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Medical Number</label>
                            <input type="text" class="form-control" id="medicalNumber" value="{{ staff.doctor_medicalnumber or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Visit Cost</label>
                            <input type="number" class="form-control" id="visitCost" step="0.01" value="{{ staff.visitcost or 0 }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Specialization</label>
                        <input type="text" class="form-control" id="specialization" value="{{ staff.role_detail or '' }}">
                    </div>
                    {% endif %}
                    
                    <div id="formMessage" class="alert d-none"></div>
                    
                    <button type="submit" class="btn btn-warning">Update Staff</button>
                    <a href="{{ url_for('staff_management.index') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('#editStaffForm').on('submit', function(e) {
        e.preventDefault();
        updateStaff();
    });
});

function updateStaff() {
    var id = $('#employeeId').val();
    
    var data = {
        firstName: $('#firstName').val(),
        lastName: $('#lastName').val(),
        nationalCode: $('#nationalCode').val(),
        contractType: $('#contractType').val(),
        hireDate: $('#hireDate').val(),
        departID: $('#department').val(),
        salary: $('#salary').val()
    };
    
    // If role change is selected
    var newRole = $('#accessLevel').val();
    if (newRole) {
        // First update the role
        $.ajax({
            url: `/staff-management/api/staff/${id}/role`,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify({ role: newRole }),
            success: function(response) {
                if (!response.success) {
                    showMessage('❌ Error updating role: ' + response.error, 'danger');
                    return;
                }
                // Then update the rest
                updateStaffDetails(id, data);
            },
            error: function(xhr) {
                try {
                    var response = JSON.parse(xhr.responseText);
                    showMessage('❌ Error: ' + response.error, 'danger');
                } catch(e) {
                    showMessage('❌ Error: ' + xhr.statusText, 'danger');
                }
            }
        });
    } else {
        updateStaffDetails(id, data);
    }
}

function updateStaffDetails(id, data) {
    $.ajax({
        url: `/staff-management/api/staff/${id}`,
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                showMessage('✅ Staff member updated successfully!', 'success');
                setTimeout(function() {
                    window.location.href = '/staff-management';
                }, 1500);
            } else {
                showMessage('❌ Error: ' + response.error, 'danger');
            }
        },
        error: function(xhr) {
            try {
                var response = JSON.parse(xhr.responseText);
                showMessage('❌ Error: ' + response.error, 'danger');
            } catch(e) {
                showMessage('❌ Error: ' + xhr.statusText, 'danger');
            }
        }
    });
}

function showMessage(message, type) {
    var msg = $('#formMessage');
    msg.removeClass('d-none alert-success alert-danger')
       .addClass(`alert-${type}`)
       .text(message);
}
</script>
{% endblock %}
