<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>ICD Codes (Diseases)</h5>
    <div class="d-flex gap-2">
        <input type="text" class="form-control search-input" data-type="icd" placeholder="Search ICD codes...">
        <button class="btn btn-primary btn-add" data-type="icd">
            <i class="bi bi-plus-circle"></i> Add ICD
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover table-striped" id="icd-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Code</th>
                <th>Disease Name</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" class="text-center">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>
