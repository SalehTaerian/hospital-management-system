<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Surgery Codes (ICDS)</h5>
    <div class="d-flex gap-2">
        <input type="text" class="form-control search-input" data-type="icds" placeholder="Search surgeries..." style="width: 250px;">
        <button class="btn btn-warning btn-add" data-type="icds">
            <i class="bi bi-plus-circle"></i> Add Surgery
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover table-striped" id="icds-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Surgery Name</th>
                <th>Cost</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" class="text-center py-4">
                    <i class="bi bi-inbox display-4 d-block text-muted"></i>
                    <p class="mt-2">Loading surgeries...</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>
