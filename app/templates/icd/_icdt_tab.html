<div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Test Codes (ICDT)</h5>
    <div class="d-flex gap-2">
        <input type="text" class="form-control search-input" data-type="icdt" placeholder="Search tests...">
        <button class="btn btn-info btn-add" data-type="icdt">
            <i class="bi bi-plus-circle"></i> Add Test
        </button>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-hover table-striped" id="icdt-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Test Name</th>
                <th>Cost</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5" class="text-center">Loading...</td>
            </tr>
        </tbody>
    </table>
</div>
