<!-- Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addModalLabel">Add New Code</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="addForm">
                <div class="modal-body">
                    <!-- Code field (for ICD only) -->
                    <div class="field-code">
                        <div class="mb-3">
                            <label for="add_code" class="form-label">Code</label>
                            <input type="text" class="form-control" id="add_code" placeholder="Enter code...">
                        </div>
                    </div>

                    <!-- Name field (for all types) -->
                    <div class="mb-3">
                        <label for="add_name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="add_name" placeholder="Enter name...">
                    </div>

                    <!-- ICD dropdown (for ICDM only) -->
                    <div class="field-icdm">
                        <div class="mb-3">
                            <label for="add_icd_id" class="form-label">Related ICD Code <span
                                    class="text-danger">*</span></label>
                            <select class="form-control" id="add_icd_id" required>
                                <option value="">Select ICD Code...</option>
                            </select>
                        </div>
                    </div>

                    <!-- Cost field (for ICDT and ICDS) -->
                    <div class="field-cost">
                        <div class="mb-3">
                            <label for="add_cost" class="form-label">Cost</label>
                            <input type="number" class="form-control" id="add_cost" placeholder="0.00" step="0.01">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="addSaveBtn">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalLabel">Edit Code</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editForm">
                <div class="modal-body">
                    <input type="hidden" id="edit_id">

                    <div class="field-code">
                        <div class="mb-3">
                            <label for="edit_code" class="form-label required-field">Code</label>
                            <input type="text" class="form-control" id="edit_code" placeholder="Enter code..." required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="edit_name" class="form-label required-field">Name</label>
                        <input type="text" class="form-control" id="edit_name" placeholder="Enter name..." required>
                    </div>

                    <div class="field-icdm">
                        <div class="mb-3">
                            <label for="edit_icd_id" class="form-label">Related ICD Code <span
                                    class="text-danger">*</span></label>
                            <select class="form-control" id="edit_icd_id" required>
                                <option value="">Select ICD Code...</option>
                            </select>
                        </div>
                    </div>

                    <div class="field-cost">
                        <div class="mb-3">
                            <label for="edit_cost" class="form-label">Cost</label>
                            <input type="number" class="form-control" id="edit_cost" placeholder="0.00" step="0.01">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="deleteForm">
                <div class="modal-body">
                    <p id="deleteMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </div>
            </form>
        </div>
    </div>
</div>
