{% extends "base.html" %}

{% block title %}My Requests{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-primary text-white shadow">
            <div class="card-body py-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0"><i class="bi bi-clipboard"></i> My Requests</h2>
                        <p class="mb-0 mt-2">View all requests you have created</p>
                    </div>
                    <a href="{{ url_for('request.create_request') }}" class="btn btn-light">
                        <i class="bi bi-plus-circle"></i> New Request
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow">
            <div class="card-body" id="requestsContainer">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary"></div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        loadRequests();
    });

    function loadRequests() {
        $.ajax({
            url: '/requests/api/doctor',
            method: 'GET',
            success: function (response) {
                var container = $('#requestsContainer');

                if (response.success && response.data && response.data.length > 0) {
                    var html = `
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Patient</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Department</th>
                                    <th>Status</th>
                                    <th>Confirmed</th>
                                    <th>Cost</th>
                                    <th>Date</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                    $.each(response.data, function (i, req) {
                        var statusColors = {
                            'Pending': 'warning',
                            'Confirmed': 'success',
                            'Cancelled': 'danger'
                        };
                        var color = statusColors[req.status] || 'secondary';
                        var confirmed = req.ispatientconfirmed ? '✅ Yes' : '❌ No';

                        html += `
                        <tr>
                            <td><strong>${req.patient_name}</strong></td>
                            <td>${req.name}</td>
                            <td><span class="badge bg-${req.request_type === 'Medicine' ? 'success' : 'info'}">${req.request_type}</span></td>
                            <td>${req.department_name || 'N/A'}</td>
                            <td><span class="badge bg-${color}">${req.status}</span></td>
                            <td>${confirmed}</td>
                            <td>$${parseFloat(req.cost || 0).toFixed(2)}</td>
                            <td>${req.createdat}</td>
                            <td>
                                ${req.status === 'Pending' && !req.ispatientconfirmed ?
                                `<button class="btn btn-sm btn-danger cancel-btn" data-request-id="${req.reqid}">
                                        <i class="bi bi-x-circle"></i> Cancel
                                    </button>` :
                                '<span class="text-muted">-</span>'
                            }
                            </td>
                        </tr>
                    `;
                    });
                    html += '</tbody></table></div>';
                    container.html(html);

                    $('.cancel-btn').on('click', function () {
                        var id = $(this).data('request-id');
                        if (confirm('Cancel this request?')) {
                            cancelRequest(id);
                        }
                    });
                } else {
                    container.html(`
                    <div class="text-center py-4">
                        <i class="bi bi-inbox display-4 text-muted"></i>
                        <p class="mt-2">No requests found</p>
                        <a href="{{ url_for('request.create_request') }}" class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i> Create Request
                        </a>
                    </div>
                `);
                }
            },
            error: function () {
                container.html('<div class="alert alert-danger">Error loading requests</div>');
            }
        });
    }

    function cancelRequest(reqId) {
        $.ajax({
            url: '/requests/api/' + reqId + '/cancel',
            method: 'POST',
            success: function (response) {
                if (response.success) {
                    alert('✅ Request cancelled successfully!');
                    loadRequests();
                } else {
                    alert('❌ Error: ' + response.error);
                }
            }
        });
    }
</script>
{% endblock %}
