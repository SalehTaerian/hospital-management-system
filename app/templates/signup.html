<!DOCTYPE html>
<html lang="en" dir="rtl">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            *{
                font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            }
            input {
                margin-bottom: 1rem;
            }

        </style>
    </head>

    <body style="height: 100vh;margin: 0;display: flex;justify-content: center;align-items: center;background-image: url('../static/assets/mainpage.jpg');background-size: cover;">
        <div style="width: 40vw;background-color: #FAFAFA ;padding: 20px;border:1px solid rgb(170, 165, 165);max-height: 90vh;overflow-y: scroll;scroll-behavior: smooth;border-radius: 10px;scrollbar-width: none;">
            <form action="" method="post">
                <h1 style="margin:auto 0;text-align: center;margin-bottom: 2rem;">ثبت نام</h1>
                <input type="text" class="form-control rounded-3" placeholder="نام" name="firstName" required>
                <input type="text" class="form-control" placeholder="نام خانوادگی" name="lastName" required>
                <input type="text" class="form-control" placeholder="نام کاربری" name="username" required>
                <input type="password" class="form-control" placeholder="رمز عبور"  name="password">
                <input type="text" class="form-control" placeholder="کد ملی" name="nationalCode" required>
                <input type="text" class="form-control" placeholder="جنسیت" name="gender" required>
                <input type="datetime" class="form-control" placeholder="تاریخ تولد"  name="dateOfBirth">
                <input type="text" class="form-control" placeholder="شماره تلفن " name="homeNumber">
                <input type="text" class="form-control" placeholder="شماره تلفن همراه" name="phoneNumber">
                <input type="text" class="form-control" placeholder="استان" name="province">
                <input type="text" class="form-control" placeholder="شهر" name="city">
                <input type="text" class="form-control" placeholder="کوچه" name="alley">
                <input type="text" class="form-control" placeholder="پلاک" name="houseCode">



                <div style="display: flex;justify-content: center;">
                <button type="submit" class="btn btn-primary">تایید</button>
                </div>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    </body>

</html>
