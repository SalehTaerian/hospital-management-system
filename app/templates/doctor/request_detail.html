{% extends "base.html" %}

{% block title %}Request Details{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-primary text-white shadow">
            <div class="card-body py-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0"><i class="bi bi-clipboard-data"></i> Request Details</h2>
                        <p class="mb-0 mt-2" id="requestTitle">Loading...</p>
                    </div>
                    <a href="{{ url_for('request.doctor_requests') }}" class="btn btn-light">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<input type="hidden" id="requestId" value="{{ req_id }}">

<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow" id="requestInfo">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Loading request details...</p>
            </div>
        </div>
    </div>
</div>

<!-- Results Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Add Test Result</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="resultForm">
                <div class="modal-body">
                    <input type="hidden" id="resultReqID">
                    <div class="mb-3">
                        <label class="form-label">Parameter</label>
                        <select class="form-control" id="resultParameterID" required>
                            <option value="">Select Parameter...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Value</label>
                        <input type="number" class="form-control" id="resultValue" step="0.01" required>
                    </div>
                    <div id="resultMessage" class="alert d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Add Result</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    var reqId = parseInt($('#requestId').val()) || 0;
    loadRequestDetails(reqId);
    loadParameters();
});

function loadRequestDetails(reqId) {
    $.ajax({
        url: '/requests/api/' + reqId,
        method: 'GET',
        success: function(response) {
            var container = $('#requestInfo');
            if (response.success) {
                var req = response.data;
                $('#requestTitle').text(req.name + ' - ' + req.request_type);
                
                var statusColors = {
                    'Pending': 'warning',
                    'Confirmed': 'success',
                    'Cancelled': 'danger',
                    'Completed': 'info'
                };
                var color = statusColors[req.status] || 'secondary';
                
                var html = `
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>Request Information</h6>
                                <table class="table table-sm">
                                    <tr><td><strong>Request ID:</strong></td><td>#${req.reqid}</td></tr>
                                    <tr><td><strong>Name:</strong></td><td>${req.name}</td></tr>
                                    <tr><td><strong>Type:</strong></td><td><span class="badge bg-${req.request_type === 'Test' ? 'info' : 'success'}">${req.request_type}</span></td></tr>
                                    <tr><td><strong>Status:</strong></td><td><span class="badge bg-${color}">${req.status}</span></td></tr>
                                    <tr><td><strong>Cost:</strong></td><td>$${parseFloat(req.cost || 0).toFixed(2)}</td></tr>
                                    <tr><td><strong>Created:</strong></td><td>${req.createdat}</td></tr>
                                    <tr><td><strong>Description:</strong></td><td>${req.description || 'N/A'}</td></tr>
                                </table>
                            </div>
                            <div class="col-md-6">
                                <h6>Patient Information</h6>
                                <table class="table table-sm">
                                    <tr><td><strong>Name:</strong></td><td>${req.firstName} ${req.lastName}</td></tr>
                                    <tr><td><strong>National Code:</strong></td><td>${req.nationalCode}</td></tr>
                                    <tr><td><strong>Doctor:</strong></td><td>${req.doctor_name}</td></tr>
                                    <tr><td><strong>Department:</strong></td><td>${req.department_name || 'N/A'}</td></tr>
                                    ${req.medicinename ? `<tr><td><strong>Medicine:</strong></td><td>${req.medicinename}</td></tr>` : ''}
                                    ${req.testname ? `<tr><td><strong>Test:</strong></td><td>${req.testname}</td></tr>` : ''}
                                </table>
                            </div>
                        </div>
                        
                        ${req.request_type === 'Test' ? `
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <h6>Test Results</h6>
                            <button class="btn btn-sm btn-success" id="addResultBtn">
                                <i class="bi bi-plus-circle"></i> Add Result
                            </button>
                        </div>
                        <div id="resultsContainer">
                            ${req.parameters && req.parameters.length > 0 ? buildResultsTable(req.parameters) : '<p class="text-muted">No results added yet</p>'}
                        </div>
                        ` : `
                        <hr>
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> This is a medicine request. No test results available.
                        </div>
                        `}
                    </div>
                `;
                container.html(html);
                
                if (req.request_type === 'Test') {
                    $('#addResultBtn').on('click', function() {
                        $('#resultReqID').val(req.reqid);
                        $('#resultModal').modal('show');
                    });
                }
                
                $('#resultForm').on('submit', function(e) {
                    e.preventDefault();
                    addResult(req.reqid);
                });
            } else {
                container.html('<div class="card-body"><div class="alert alert-danger">' + (response.error || 'Failed to load request') + '</div></div>');
            }
        },
        error: function() {
            $('#requestInfo').html('<div class="card-body"><div class="alert alert-danger">Error loading request details</div></div>');
        }
    });
}

function buildResultsTable(parameters) {
    var html = `
        <div class="table-responsive mt-2">
            <table class="table table-sm table-striped">
                <thead>
                    <tr>
                        <th>Parameter</th>
                        <th>Value</th>
                        <th>Min</th>
                        <th>Max</th>
                        <th>Average</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
    `;
    parameters.forEach(function(p) {
        var status = '';
        var color = 'secondary';
        if (p.min !== null && p.max !== null) {
            if (p.parametervalue < p.min) {
                status = 'Low';
                color = 'warning';
            } else if (p.parametervalue > p.max) {
                status = 'High';
                color = 'danger';
            } else {
                status = 'Normal';
                color = 'success';
            }
        }
        html += `
            <tr>
                <td><strong>${p.parametername}</strong></td>
                <td>${p.parametervalue}</td>
                <td>${p.min !== null ? p.min : '-'}</td>
                <td>${p.max !== null ? p.max : '-'}</td>
                <td>${p.average !== null ? p.average : '-'}</td>
                <td><span class="badge bg-${color}">${status || 'N/A'}</span></td>
            </tr>
        `;
    });
    html += `
                </tbody>
            </table>
        </div>
    `;
    return html;
}

function loadParameters() {
    $.ajax({
        url: '/doctor/api/vital/parameters',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                var select = $('#resultParameterID');
                select.empty();
                select.append('<option value="">Select Parameter...</option>');
                $.each(response.data, function(i, p) {
                    var range = '';
                    if (p.min !== null && p.max !== null) {
                        range = ' (Range: ' + p.min + ' - ' + p.max + ')';
                    }
                    select.append('<option value="' + p.id + '">' + p.name + range + '</option>');
                });
            }
        }
    });
}

function addResult(reqId) {
    var data = {
        reqID: $('#resultReqID').val(),
        parameterID: $('#resultParameterID').val(),
        parameterValue: $('#resultValue').val()
    };
    
    if (!data.parameterID) {
        showResultMessage('Please select a parameter', 'danger');
        return;
    }
    if (!data.parameterValue) {
        showResultMessage('Please enter a value', 'danger');
        return;
    }
    
    $.ajax({
        url: '/requests/api/' + reqId + '/results',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                $('#resultModal').modal('hide');
                loadRequestDetails(reqId);
                showResultMessage('Result added successfully!', 'success');
            } else {
                showResultMessage('Error: ' + response.error, 'danger');
            }
        },
        error: function() {
            showResultMessage('Error adding result', 'danger');
        }
    });
}

function showResultMessage(message, type) {
    var msg = $('#resultMessage');
    msg.removeClass('d-none alert-success alert-danger')
       .addClass('alert-' + type)
       .text(message);
}
</script>
{% endblock %}
