{% extends "base.html" %}

{% block title %}Staff Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">Staff Login</h4>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">National Code</label>
                        <input type="text" class="form-control" name="nationalCode" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Login</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.patient_login') }}">Patient Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
