{% extends "base.html" %}

{% block title %}Admission Details{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-primary text-white shadow">
            <div class="card-body py-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0"><i class="bi bi-hospital"></i> Admission Details</h2>
                    </div>
                    <div>
                        <button class="btn btn-warning btn-transfer" data-adm-id="{{ admID }}">
                            <i class="bi bi-arrow-left-right"></i> Transfer
                        </button>
                        <button class="btn btn-success btn-discharge" data-adm-id="{{ admID }}">
                            <i class="bi bi-box-arrow-right"></i> Discharge
                        </button>
                        <a href="{{ url_for('admission.index') }}" class="btn btn-light">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow" id="detailContainer">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Loading...</p>
            </div>
        </div>
    </div>
</div>

<!-- Transfer Modal -->
<div class="modal fade" id="transferModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Transfer Patient</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="transferForm">
                    <input type="hidden" id="transferAdmId">
                    
                    <div class="mb-3">
                        <label class="form-label">Room</label>
                        <select class="form-control" id="transferRoomId" required>
                            <option value="">Select Room...</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Bed</label>
                        <select class="form-control" id="transferBedId" required>
                            <option value="">Select a room first...</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Transfer Cost</label>
                        <input type="number" class="form-control" id="transferCost" step="0.01" placeholder="0.00">
                    </div>
                    
                    <div id="transferMessage" class="alert d-none"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmTransferBtn">Transfer</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    loadAdmissionDetail();
    loadRoomsForTransfer();
    
    $('.btn-transfer').on('click', function() {
        var admId = $(this).data('adm-id');
        $('#transferAdmId').val(admId);
        $('#transferModal').modal('show');
    });
    
    $('.btn-discharge').on('click', function() {
        var admId = $(this).data('adm-id');
        if (confirm('Are you sure you want to discharge this patient?')) {
            dischargePatient(admId);
        }
    });
    
    $('#transferRoomId').on('change', function() {
        var roomId = $(this).val();
        if (roomId) {
            loadTransferBeds(roomId);
        } else {
            $('#transferBedId').html('<option value="">Select a room first...</option>');
        }
    });
    
    $('#confirmTransferBtn').on('click', function() {
        transferPatient();
    });
});

function loadAdmissionDetail() {
    var admId = {{ admID }};
    $.ajax({
        url: '/admissions/api/admissions/' + admId,
        method: 'GET',
        success: function(response) {
            var container = $('#detailContainer');
            if (response.success) {
                var adm = response.data;
                var transfers = response.transfers || [];
                
                var statusBadge = adm.bed_status === 'Occupied' ? 
                    '<span class="badge bg-success">Active</span>' : 
                    '<span class="badge bg-secondary">Discharged</span>';
                
                var html = '<div class="card-body">';
                html += '<div class="row">';
                html += '<div class="col-md-6">';
                html += '<h5>Patient Information</h5>';
                html += '<table class="table table-sm">';
                html += '<tr><td><strong>Name:</strong></td><td>' + adm.patient_name + '</td></tr>';
                html += '<tr><td><strong>National Code:</strong></td><td>' + adm.nationalcode + '</td></tr>';
                html += '<tr><td><strong>Doctor:</strong></td><td>' + adm.doctor_name + ' (' + adm.specialization + ')</td></tr>';
                html += '<tr><td><strong>Admission Date:</strong></td><td>' + (adm.admission_date || adm.createdat) + '</td></tr>';
                html += '</table>';
                html += '</div>';
                html += '<div class="col-md-6">';
                html += '<h5>Bed Information</h5>';
                html += '<table class="table table-sm">';
                html += '<tr><td><strong>Bed:</strong></td><td>#' + (adm.bedid || 'N/A') + '</td></tr>';
                html += '<tr><td><strong>Room:</strong></td><td>' + (adm.room_name || 'N/A') + '</td></tr>';
                html += '<tr><td><strong>Department:</strong></td><td>' + (adm.department_name || 'N/A') + '</td></tr>';
                html += '<tr><td><strong>Status:</strong></td><td>' + statusBadge + '</td></tr>';
                html += '<tr><td><strong>Cost:</strong></td><td>$' + parseFloat(adm.cost || 0).toFixed(2) + '</td></tr>';
                html += '</table>';
                html += '</div>';
                html += '</div>';
                
                // Transfer History
                if (transfers.length > 0) {
                    html += '<hr><h5>Transfer History</h5>';
                    html += '<div class="table-responsive"><table class="table table-sm table-striped">';
                    html += '<thead><tr><th>From Room</th><th>To Room</th><th>Date</th><th>Cost</th></tr></thead><tbody>';
                    $.each(transfers, function(i, t) {
                        html += '<tr>';
                        html += '<td>' + (t.from_room || '-') + '</td>';
                        html += '<td>' + (t.to_room || '-') + '</td>';
                        html += '<td>' + t.transferedat + '</td>';
                        html += '<td>$' + parseFloat(t.cost || 0).toFixed(2) + '</td>';
                        html += '</tr>';
                    });
                    html += '</tbody></table></div>';
                }
                
                html += '</div>';
                container.html(html);
            } else {
                container.html('<div class="card-body"><div class="alert alert-danger">' + response.error + '</div></div>');
            }
        },
        error: function() {
            $('#detailContainer').html('<div class="card-body"><div class="alert alert-danger">Error loading admission details</div></div>');
        }
    });
}

function loadRoomsForTransfer() {
    $.ajax({
        url: '/admissions/api/rooms',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                var select = $('#transferRoomId');
                $.each(response.data, function(i, room) {
                    select.append('<option value="' + room.id + '">' + room.name + (room.description ? ' - ' + room.description : '') + '</option>');
                });
            }
        }
    });
}

function loadTransferBeds(roomId) {
    $.ajax({
        url: '/admissions/api/rooms/' + roomId + '/beds',
        method: 'GET',
        success: function(response) {
            var select = $('#transferBedId');
            select.empty();
            select.append('<option value="">Select Bed...</option>');
            if (response.success && response.data && response.data.length > 0) {
                $.each(response.data, function(i, bed) {
                    select.append('<option value="' + bed.bedid + '">Bed #' + bed.bedid + ' - $' + parseFloat(bed.cost || 0).toFixed(2) + '</option>');
                });
            } else {
                select.append('<option value="">No beds available in this room</option>');
            }
        }
    });
}

function dischargePatient(admId) {
    $.ajax({
        url: '/admissions/api/admissions/' + admId + '/discharge',
        method: 'POST',
        success: function(response) {
            if (response.success) {
                alert('✅ Patient discharged successfully!');
                loadAdmissionDetail();
            } else {
                alert('❌ Error: ' + response.error);
            }
        }
    });
}

function transferPatient() {
    var admId = $('#transferAdmId').val();
    var data = {
        room_id: $('#transferRoomId').val(),
        bed_id: $('#transferBedId').val(),
        cost: $('#transferCost').val() || 0
    };
    
    if (!data.room_id) {
        showTransferMessage('Please select a room', 'danger');
        return;
    }
    if (!data.bed_id) {
        showTransferMessage('Please select a bed', 'danger');
        return;
    }
    
    $.ajax({
        url: '/admissions/api/admissions/' + admId + '/transfer',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                $('#transferModal').modal('hide');
                alert('✅ Patient transferred successfully!');
                loadAdmissionDetail();
            } else {
                showTransferMessage('❌ Error: ' + response.error, 'danger');
            }
        },
        error: function(xhr) {
            try {
                var response = JSON.parse(xhr.responseText);
                showTransferMessage('❌ Error: ' + response.error, 'danger');
            } catch(e) {
                showTransferMessage('❌ Error: ' + xhr.statusText, 'danger');
            }
        }
    });
}

function showTransferMessage(message, type) {
    var msg = $('#transferMessage');
    msg.removeClass('d-none alert-success alert-danger').addClass('alert-' + type).text(message);
}
</script>
{% endblock %}
