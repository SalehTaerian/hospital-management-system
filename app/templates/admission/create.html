{% extends "base.html" %}

{% block title %}New Admission{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-primary text-white shadow">
            <div class="card-body py-4">
                <h2 class="mb-0"><i class="bi bi-plus-circle"></i> New Admission</h2>
                <p class="mb-0 mt-2">Admit a patient to the hospital</p>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow">
            <div class="card-body">
                <form id="admissionForm">
                    <div class="mb-3">
                        <label class="form-label">Patient</label>
                        <input type="text" class="form-control" id="patientSearch" placeholder="Search by name or national code...">
                        <input type="hidden" id="patientId">
                        <div id="patientSuggestions" class="list-group mt-1"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Doctor</label>
                        <select class="form-control" id="doctorId" required>
                            <option value="">Select Doctor...</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Room</label>
                        <select class="form-control" id="roomId" required>
                            <option value="">Select Room...</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Bed</label>
                        <select class="form-control" id="bedId" required>
                            <option value="">Select a room first...</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Admission Cost</label>
                        <input type="number" class="form-control" id="admissionCost" step="0.01" placeholder="0.00">
                    </div>
                    
                    <div id="formMessage" class="alert d-none"></div>
                    
                    <button type="submit" class="btn btn-primary">Admit Patient</button>
                    <a href="{{ url_for('admission.index') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    var searchTimeout;
    
    loadDoctors();
    loadRooms();
    
    $('#patientSearch').on('keyup', function() {
        clearTimeout(searchTimeout);
        var query = $(this).val().trim();
        if (query.length < 2) {
            $('#patientSuggestions').empty();
            return;
        }
        searchTimeout = setTimeout(function() {
            searchPatients(query);
        }, 300);
    });
    
    $('#roomId').on('change', function() {
        var roomId = $(this).val();
        if (roomId) {
            loadBedsByRoom(roomId);
        } else {
            $('#bedId').html('<option value="">Select a room first...</option>');
        }
    });
    
    $('#admissionForm').on('submit', function(e) {
        e.preventDefault();
        createAdmission();
    });
});

function searchPatients(query) {
    $.ajax({
        url: '/staff/api/patients/search?q=' + encodeURIComponent(query),
        method: 'GET',
        success: function(response) {
            var container = $('#patientSuggestions');
            container.empty();
            if (response.success && response.data && response.data.length > 0) {
                $.each(response.data, function(i, patient) {
                    container.append(
                        '<a href="#" class="list-group-item list-group-item-action" onclick="selectPatient(' + patient.pid + ', \'' + patient.firstname + ' ' + patient.lastname + '\')">' +
                        '<strong>' + patient.firstname + ' ' + patient.lastname + '</strong><br>' +
                        '<small class="text-muted">' + patient.nationalcode + '</small>' +
                        '</a>'
                    );
                });
            }
        }
    });
}

function selectPatient(id, name) {
    $('#patientId').val(id);
    $('#patientSearch').val(name);
    $('#patientSuggestions').empty();
}

function loadDoctors() {
    $.ajax({
        url: '/admissions/api/doctors',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                var select = $('#doctorId');
                $.each(response.data, function(i, doctor) {
                    select.append('<option value="' + doctor.id + '">' + doctor.name + ' - ' + doctor.specialization + '</option>');
                });
            }
        }
    });
}

function loadRooms() {
    $.ajax({
        url: '/admissions/api/rooms',
        method: 'GET',
        success: function(response) {
            if (response.success) {
                var select = $('#roomId');
                $.each(response.data, function(i, room) {
                    select.append('<option value="' + room.id + '">' + room.name + (room.description ? ' - ' + room.description : '') + '</option>');
                });
            }
        }
    });
}

function loadBedsByRoom(roomId) {
    $.ajax({
        url: '/admissions/api/rooms/' + roomId + '/beds',
        method: 'GET',
        success: function(response) {
            var select = $('#bedId');
            select.empty();
            select.append('<option value="">Select Bed...</option>');
            if (response.success && response.data && response.data.length > 0) {
                $.each(response.data, function(i, bed) {
                    select.append('<option value="' + bed.bedid + '">Bed #' + bed.bedid + ' - $' + parseFloat(bed.cost || 0).toFixed(2) + '</option>');
                });
            } else {
                select.append('<option value="">No beds available in this room</option>');
            }
        }
    });
}

function createAdmission() {
    var data = {
        patient_id: $('#patientId').val(),
        doctor_id: $('#doctorId').val(),
        room_id: $('#roomId').val(),
        bed_id: $('#bedId').val(),
        cost: $('#admissionCost').val() || 0
    };
    
    if (!data.patient_id) {
        showMessage('Please select a patient', 'danger');
        return;
    }
    if (!data.doctor_id) {
        showMessage('Please select a doctor', 'danger');
        return;
    }
    if (!data.room_id) {
        showMessage('Please select a room', 'danger');
        return;
    }
    if (!data.bed_id) {
        showMessage('Please select a bed', 'danger');
        return;
    }
    
    $.ajax({
        url: '/admissions/api/admissions',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(data),
        success: function(response) {
            if (response.success) {
                showMessage('✅ Patient admitted successfully!', 'success');
                setTimeout(function() {
                    window.location.href = '/admissions/' + response.id;
                }, 1500);
            } else {
                showMessage('❌ Error: ' + response.error, 'danger');
            }
        },
        error: function(xhr) {
            try {
                var response = JSON.parse(xhr.responseText);
                showMessage('❌ Error: ' + response.error, 'danger');
            } catch(e) {
                showMessage('❌ Error: ' + xhr.statusText, 'danger');
            }
        }
    });
}

function showMessage(message, type) {
    var msg = $('#formMessage');
    msg.removeClass('d-none alert-success alert-danger').addClass('alert-' + type).text(message);
}
</script>
{% endblock %}
