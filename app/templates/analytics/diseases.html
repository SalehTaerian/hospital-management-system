{% extends "base.html" %}

{% block title %}All Diseases{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card bg-primary text-white shadow">
            <div class="card-body py-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-0"><i class="bi bi-list-ul"></i> All Diseases</h2>
                        <p class="mb-0 mt-2">Complete list of diseases with abundance statistics</p>
                    </div>
                    <a href="{{ url_for('analytics.index') }}" class="btn btn-light">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row mt-4">
    <div class="col-12">
        <div class="card shadow">
            <div class="card-body">
                <input type="text" class="form-control mb-3" id="searchInput" placeholder="Search diseases...">
                <div id="diseaseContainer">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    loadAllDiseases();
    
    $('#searchInput').on('keyup', function() {
        var search = $(this).val().toLowerCase();
        $('#diseaseContainer .disease-item').each(function() {
            var text = $(this).text().toLowerCase();
            $(this).toggle(text.indexOf(search) > -1);
        });
    });
});

function loadAllDiseases() {
    $.ajax({
        url: '/analytics/api/disease/abundance',
        method: 'GET',
        success: function(response) {
            var container = $('#diseaseContainer');
            if (response.success && response.data && response.data.length > 0) {
                var html = `
                    <div class="table-responsive">
                        <table class="table table-hover table-striped">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Code</th>
                                    <th>Disease Name</th>
                                    <th>Diagnoses</th>
                                    <th>Patients</th>
                                    <th>Appointments</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                $.each(response.data, function(i, d) {
                    html += `
                        <tr class="disease-item">
                            <td>${i + 1}</td>
                            <td><strong>${d.code}</strong></td>
                            <td>${d.diseasename}</td>
                            <td><span class="badge bg-primary">${d.diagnosis_count || 0}</span></td>
                            <td>${d.patient_count || 0}</td>
                            <td>${d.appointment_count || 0}</td>
                            <td>
                                <a href="/analytics/disease/${d.icdid}" class="btn btn-sm btn-info">
                                    <i class="bi bi-eye"></i> Details
                                </a>
                            </td>
                        </tr>
                    `;
                });
                html += `
                            </tbody>
                        </table>
                    </div>
                `;
                container.html(html);
            } else {
                container.html('<p class="text-muted">No disease data available</p>');
            }
        }
    });
}
</script>
{% endblock %}
